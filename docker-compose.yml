services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"

  api-service:
    build:
      context: ./api-service
    depends_on:
      - nats
    environment:
      PORT: 3000
      NATS_URL: nats://nats:4222
      DB_PATH: /app/data/files.db
      UPLOADS_DIR: /app/uploads
      PROCESSED_DIR: /app/processed
      MEDIA_ROOT: /workspace
    volumes:
      - ./api-service/data:/app/data
      - ./api-service/uploads:/app/uploads
      - ./api-service/processed:/app/processed
      - ./:/workspace:ro
    ports:
      - "3000:3000"

  processing-service:
    build:
      context: ./processing-service
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222
      PROCESSED_DIR: /app/processed
    volumes:
      - ./api-service/processed:/app/processed
      - ./:/workspace:ro

  spa:
    build:
      context: ./spa
    depends_on:
      - api-service
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
