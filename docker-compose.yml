services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unicast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"

  api-service:
    build:
      context: ./api-service
    depends_on:
      - postgres
      - nats
    environment:
      PORT: 3000
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/unicast
      UPLOADS_DIR: /app/uploads
      PROCESSED_DIR: /app/processed
      MEDIA_ROOT: /workspace
    volumes:
      - ./api-service/uploads:/app/uploads
      - ./api-service/processed:/app/processed
      - ./:/workspace:ro
    ports:
      - "3000:3000"

  processing-service:
    build:
      context: ./processing-service
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222
      PROCESSED_DIR: /app/processed
    volumes:
      - ./api-service/processed:/app/processed
      - ./:/workspace:ro

  spa:
    build:
      context: ./spa
    depends_on:
      - api-service
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
